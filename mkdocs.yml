site_name: agentguard
site_description: Runtime budget control and tool-call reliability for AI agents
site_url: https://rigvedrs.github.io/agentguard/
repo_url: https://github.com/rigvedrs/agentguard
repo_name: rigvedrs/agentguard
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - content.code.copy
    - content.code.annotate
    - navigation.sections
    - navigation.tabs
    - navigation.top
    - navigation.tracking
    - search.highlight
    - search.suggest
    - toc.integrate
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            show_source: true
            show_root_heading: true

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Guides:
    - "@guard Decorator": guides/guard-decorator.md
    - Response Verification: guides/response-verification.md
    - Circuit Breaker: guides/circuit-breaker.md
    - Rate Limiting: guides/rate-limiting.md
    - Budget Enforcement: guides/budget-enforcement.md
    - Custom Validators: guides/custom-validators.md
    - Tracing: guides/tracing.md
    - Testing: guides/testing.md
  - Integrations:
    - OpenAI: integrations/openai.md
    - Anthropic: integrations/anthropic.md
    - LangChain: integrations/langchain.md
    - MCP: integrations/mcp.md
    - OpenRouter: integrations/openrouter.md
    - CrewAI: integrations/crewai.md
    - AutoGen: integrations/autogen.md
  - Reference:
    - API Reference: reference/api.md
    - GuardConfig: reference/config.md
    - Types: reference/types.md
    - Errors: reference/errors.md
    - CLI: reference/cli.md
  - Advanced:
    - Middleware: advanced/middleware.md
    - Policy as Code: advanced/policy-as-code.md
    - Multi-Agent: advanced/multi-agent.md
    - Telemetry: advanced/telemetry.md
    - Trace Platform: advanced/trace-platform.md
    - Benchmarking: advanced/benchmarking.md
  - Contributing: contributing.md
  - Changelog: changelog.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/rigvedrs/agentguard
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/awesome-agentguard/
